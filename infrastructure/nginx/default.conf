server {
    listen 80;
    server_name convertcraft.cc;
    # Route all requests on the root domain to the web service
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name api.convertcraft.cc;
    # Forward all API requests to the api service
    location / {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through tenant slug and authorization headers
        proxy_set_header x-tenant-slug $http_x_tenant_slug;
        proxy_set_header Authorization $http_authorization;
    }
}
