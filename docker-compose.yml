version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: trainstack-postgres
    environment:
      POSTGRES_DB: trainstack
      POSTGRES_USER: trainstack
      POSTGRES_PASSWORD: trainstack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: trainstack-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://trainstack:trainstack@postgres:5432/trainstack
      REDIS_URL: redis://redis:6379
      PORT: 4000
    depends_on: [postgres, redis]
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: [.env]
    command: ["npm", "run", "start:worker", "--workspace", "@trainstack/api"]
    environment:
      DATABASE_URL: postgresql://trainstack:trainstack@postgres:5432/trainstack
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, redis]

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    env_file: [.env]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on: [api]
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    depends_on: [api, web]
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
