version: "3.9"

services:
  postgres:
    image: postgres:16
    # Do not set container_name; let Docker manage it automatically
    environment:
      POSTGRES_DB: trainstack
      POSTGRES_USER: trainstack
      POSTGRES_PASSWORD: trainstack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Only internal; no public port mapping for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    # Only internal; no public port mapping for security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://trainstack:trainstack@postgres:5432/trainstack
      REDIS_URL: redis://redis:6379
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: [.env]
    command: ["npm", "run", "start:worker", "--workspace", "@trainstack/api"]
    environment:
      DATABASE_URL: postgresql://trainstack:trainstack@postgres:5432/trainstack
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    env_file: [.env]
    environment:
      # The API is reachable via the internal Docker network; do not reference localhost inside a container
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    # Expose nginx as the only public entrypoint
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
